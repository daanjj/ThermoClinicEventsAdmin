<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 18px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
    }

    .scroll {
      height: 620px;
      overflow: auto;
      padding-right: 10px;
    }

    section {
      margin-bottom: 16px;
    }

    pre {
      background: #f4f4f4;
      padding: 8px;
      border-radius: 4px;
    }

    .warn {
      color: #8a0000;
      font-weight: bold;
    }

    ul {
      margin-top: 6px;
    }

    .small {
      font-size: 0.95em;
      color: #555;
    }

    /* Markdown Alert Styles */
    .alert {
      padding: 12px;
      margin: 16px 0;
      border-left: 4px solid #ccc;
      border-radius: 4px;
      background: #f9f9f9;
    }
    .alert-note { border-left-color: #0969da; background-color: #f6f8fa; }
    .alert-tip { border-left-color: #1a7f37; background-color: #f0fdf4; }
    .alert-important { border-left-color: #8250df; background-color: #fbefff; }
    .alert-warning { border-left-color: #9a6700; background-color: #fff8c5; }
    .alert-caution { border-left-color: #d1242f; background-color: #fff1f0; }
    .alert strong { text-transform: capitalize; }
  </style>
</head>

<body>
  <div class="container">
    <div id="content" class="scroll">
      <p>Bezig met laden van de handleiding...</p>
    </div>
    <div style="margin-top:12px; text-align:right;">
      <button onclick="google.script.host.close()">Sluiten</button>
    </div>
  </div>

  <!-- Load marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // The markdown content will be injected here by the server-side script
    const markdownContent = <?!= markdown ?>;
    
    window.onload = function() {
      try {
        const contentDiv = document.getElementById('content');
        
        // Simple pre-processing for GitHub-style alerts
        const processedMarkdown = markdownContent.replace(
          /^> \[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\n> (.*)$/gm,
          (match, type, content) => {
            const className = type.toLowerCase();
            return `<div class="alert alert-${className}"><strong>${type}:</strong> ${content}</div>`;
          }
        );

        contentDiv.innerHTML = marked.parse(processedMarkdown);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p class="warn">Fout bij het laden van de handleiding: ' + e.message + '</p>';
      }
    };
  </script>
</body>

</html>
